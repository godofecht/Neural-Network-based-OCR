name: CI/CD Pipeline

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout OCR repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake libx11-dev

      - name: Configure with CMake
        run: |
          mkdir -p build
          cd build
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build OCR
        run: |
          cd build
          cmake --build . --config Release -j$(nproc)

      - name: Verify executable
        run: |
          ls -lh build/ocr_trainer
          file build/ocr_trainer
          echo "✅ Linux build successful!"

      - name: Test executable
        run: |
          cd build
          timeout 3 ./ocr_trainer <<EOF || true
          5
          2
          no
          EOF
          echo "✅ Executable runs without crashing"

  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout OCR repo
        uses: actions/checkout@v4

      - name: Setup CMake
        uses: cmake-js/setup-cmake@v3
        with:
          cmake-version: '3.25.x'

      - name: Configure with CMake
        run: |
          mkdir -p build
          cd build
          cmake .. -G "Visual Studio 17 2022" -DCMAKE_BUILD_TYPE=Release

      - name: Build OCR
        run: |
          cd build
          cmake --build . --config Release -j 4

      - name: Verify executable
        run: |
          Get-ChildItem build/Release/ocr_trainer.exe
          Write-Host "✅ Windows build successful!"

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Verify project structure
        run: |
          test -f README.md && echo "✅ README.md exists"
          test -f CMakeLists.txt && echo "✅ CMakeLists.txt exists"
          test -f NeuralNetworkComputation/Source.cpp && echo "✅ Source.cpp exists"
          echo "✅ All required files present"
          
      - name: Check for Visual Studio files
        run: |
          if [ -f "NeuralNetworkComputation.sln" ] || [ -d ".vs" ] || [ -d "x64" ]; then
            echo "❌ Error: Visual Studio project files found in repository"
            exit 1
          fi
          echo "✅ No Visual Studio files in root directory"
